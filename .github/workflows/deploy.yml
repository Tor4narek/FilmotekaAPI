name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,KINOPOISK_API_KEY,JWT_SECRET
          script: |
            set -e
            cd /opt/filmoteka
            git pull origin main

            # Generate .env from secrets
            cat > .env <<EOF
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}

            ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${{ secrets.POSTGRES_DB }};Username=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}
            ConnectionStrings__Redis=redis:6379

            Kinopoisk__ApiKey=${{ secrets.KINOPOISK_API_KEY }}

            Jwt__Secret=${{ secrets.JWT_SECRET }}
            Jwt__Issuer=filmoteka-api
            Jwt__Audience=filmoteka-client
            Jwt__AccessTokenExpiryMinutes=15
            Jwt__RefreshTokenExpiryDays=7

            Puppeteer__ExecutablePath=/usr/bin/chromium
            EOF

            docker compose build --no-cache api
            docker compose up -d --remove-orphans
            sleep 8
            docker compose ps
